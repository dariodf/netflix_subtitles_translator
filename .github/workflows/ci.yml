name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: make test
      - run: make check
      - run: make build

  smoke:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      models: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Translate smoke episode via GitHub Models
        env:
          PROVIDER_API_KEY: ${{ github.token }}
        run: make headless CONFIG=ci-smoke EPISODE=smoke-test
