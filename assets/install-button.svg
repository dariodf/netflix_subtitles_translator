<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56">
  <defs>
    <linearGradient id="btn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#b20710"/>
    </linearGradient>
  </defs>

  <!-- Button background -->
  <rect width="280" height="56" rx="12" fill="url(#btn-bg)"/>

  <!-- Inset mini-logo: light circle with subtitle bars — larger -->
  <g transform="translate(6, 3)">
    <circle cx="25" cy="25" r="23" fill="#ffffff"/>
    <circle cx="25" cy="25" r="23" fill="none" stroke="#ccc" stroke-width="0.5"/>

    <rect x="10" y="15" width="30" height="7" rx="2" fill="rgba(0,0,0,0.08)"/>
    <text x="25" y="18.5" font-family="Helvetica Neue, Arial, sans-serif" font-size="5" font-weight="600" fill="rgba(0,0,0,0.35)" text-anchor="middle" dominant-baseline="central">字幕!</text>

    <path d="M25 24 L25 28 M22.5 26.5 L25 28 L27.5 26.5" stroke="rgba(0,0,0,0.2)" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="10" y="30" width="30" height="7" rx="2" fill="url(#btn-bg)"/>
    <text x="25" y="33.5" font-family="Helvetica Neue, Arial, sans-serif" font-size="4.5" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle" dominant-baseline="central">Subtitles!</text>
  </g>

  <!-- Text -->
  <text x="62" y="27" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="white" letter-spacing="0.5">Install Userscript</text>
  <text x="62" y="43" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Click to add to Tampermonkey</text>
</svg>
